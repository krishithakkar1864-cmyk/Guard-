{% extends 'base.html' %}
{% load static %}
{% block content %}
<a href="../displaydata">Displaydata </a>

<section class="contact_section layout_padding">
    <div class="contact_bg_box">
      <div class="img-box">
        <img src="{% static 'images/contact-bg.jpg' %}" alt="">
      </div>
    </div>
    <div class="container">
      <div class="heading_container heading_center">
        <h2>
            Edit data
        </h2>
        {% if messages %}
                  {% for message in messages %}
                  {{message}}
                  {% endfor %}
                  {% endif %}
      </div>
      <form action='' method='post'>
         {% csrf_token %}
      <table class="table table-borderless table-success table-striped">
        <caption>List of Employers</caption>
        <tr>
            <th>Id</th>
            <th><input type="text" name="eid" value="{{editdata.eid}}"></th>
           </tr>
           <tr>
            <th>Name</th>
            <th><input type="text" name="ename" value="{{editdata.ename}}"></th>
        </tr>
        <tr>
            <th>EMail</th>
            <th><input type="text" name="eemail" value="{{editdata.eemail}}"></th>
        </tr>
        <tr>
            <th>Contact</th>
            <th><input type="text" name="econtact" value="{{editdata.econtact}}"></th>
        </tr>
        </table>

        <table>
        <tr>
            <button type='submit'>Submit Data</button>
        </tr>

    </table>
  </form>
      </div>
    </div>
  </section>
  
{% endblock content %}
